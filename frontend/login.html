<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Techtronic</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="top-bar"><div class="container"><div class="contact-links"><span>☎ +20 101 123 321</span><span>✉ support@techtronic.com</span></div><div class="top-links" data-auth-area></div></div></div>
  <header class="header"><div class="container header-main"><a class="logo" href="index.html">TECH<span>TRONIC</span><small>Electronic Commerce</small></a><form class="search-form" action="shop.html"><input name="search" placeholder="Type here"><button>Search</button></form><div class="header-actions"><a class="cart-link" href="cart.html">♥</a><a class="cart-link" href="cart.html">🛒<span class="cart-count" data-cart-count>0</span></a></div></div></header>
  <nav class="nav"><div class="container nav-bar"><a href="index.html">Home</a><a href="shop.html">Shop</a><a href="cart.html">Cart</a><a href="profile.html">Orders</a></div></nav>

  <section class="section">
    <div class="container">
      <form class="panel form-grid" id="loginForm" style="max-width:460px;margin:auto;">
        <h1>Login</h1>
        <input name="email" type="email" value="user1@student.com" placeholder="Email" required>
        <input name="password" type="password" value="123456" placeholder="Password" required>
        <button class="primary-btn">Login</button>
        <p class="message" id="loginMessage"></p>
        <p>New customer? <a href="register.html" style="color:var(--blue);font-weight:800;">Create an account</a></p>
      </form>
    </div>
  </section>

  <script src="js/config.js"></script><script src="js/demo-data.js"></script><script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/cart.js"></script><script src="js/login.js"></script>
</body>
</html>
